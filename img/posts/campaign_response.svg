<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Predicting marketing campaign response">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#252a36"/>
      <stop offset="1" stop-color="#121419"/>
    </linearGradient>
    <linearGradient id="gb" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#17A589"/>
      <stop offset="1" stop-color="#2E86C1"/>
    </linearGradient>
    <linearGradient id="env" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1ec8a5"/>
      <stop offset="1" stop-color="#177fb4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2E86C1" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#2E86C1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#17A589" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#17A589" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- faint grid -->
  <g stroke="#3E4250" stroke-width="1" opacity="0.30">
    <line x1="0" y1="130" x2="800" y2="130"/>
    <line x1="0" y1="260" x2="800" y2="260"/>
    <line x1="0" y1="390" x2="800" y2="390"/>
    <line x1="160" y1="0" x2="160" y2="600"/>
    <line x1="320" y1="0" x2="320" y2="600"/>
    <line x1="480" y1="0" x2="480" y2="600"/>
    <line x1="640" y1="0" x2="640" y2="600"/>
  </g>

  <!-- atmosphere -->
  <ellipse cx="220" cy="420" rx="300" ry="240" fill="url(#glow2)"/>
  <ellipse cx="620" cy="200" rx="300" ry="240" fill="url(#glow)"/>

  <!-- the mailer: open envelope, letters leaving as customer dots -->
  <g transform="translate(200,430)">
    <!-- back flap open -->
    <polygon points="-95,-38 0,-108 95,-38" fill="#181d29" stroke="url(#gb)" stroke-width="4" stroke-linejoin="round"/>
    <!-- body -->
    <rect x="-95" y="-38" width="190" height="120" rx="10" fill="url(#env)"/>
    <!-- front fold shading -->
    <polygon points="-95,-38 0,32 95,-38 95,82 -95,82" fill="#101318" opacity="0.22"/>
    <polygon points="-95,-38 0,32 95,-38" fill="none" stroke="#0f1216" stroke-width="4" stroke-linejoin="round" opacity="0.55"/>
    <!-- letter peeking out -->
    <rect x="-58" y="-84" width="116" height="52" rx="6" fill="#e7e7e7"/>
    <line x1="-40" y1="-66" x2="40" y2="-66" stroke="#9aa4b0" stroke-width="6" stroke-linecap="round"/>
    <line x1="-40" y1="-50" x2="16" y2="-50" stroke="#c3cad2" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- decision boundary: sigmoid sweeping the field -->
  <path d="M 90 330 C 300 330, 380 160, 560 150 L 750 150" fill="none" stroke="url(#gb)" stroke-width="5" stroke-linecap="round" opacity="0.9"/>

  <!-- customer stream: responders arc up across the boundary... -->
  <g fill="#1ABC9C">
    <circle cx="330" cy="320" r="8"/>
    <circle cx="402" cy="272" r="8"/>
    <circle cx="470" cy="230" r="8"/>
    <circle cx="536" cy="196" r="8"/>
    <circle cx="600" cy="172" r="8"/>
  </g>
  <!-- ...non-responders drift flat and fade -->
  <g fill="none" stroke="#8b95a3" stroke-width="3">
    <circle cx="340" cy="404" r="8" opacity="0.9"/>
    <circle cx="416" cy="424" r="8" opacity="0.75"/>
    <circle cx="492" cy="440" r="8" opacity="0.6"/>
    <circle cx="566" cy="452" r="8" opacity="0.45"/>
    <circle cx="636" cy="460" r="8" opacity="0.3"/>
  </g>

  <!-- the target: responders land in the bullseye -->
  <g transform="translate(650,120)">
    <circle r="66" fill="#101318" stroke="#ffffff" stroke-width="6"/>
    <circle r="44" fill="none" stroke="url(#gb)" stroke-width="5"/>
    <circle r="22" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.8"/>
    <circle r="9" fill="#1ABC9C"/>
  </g>

  <!-- one highlighted convert crossing the line -->
  <circle cx="470" cy="230" r="14" fill="none" stroke="#ffffff" stroke-width="3"/>
</svg>
