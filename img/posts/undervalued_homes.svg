<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Detecting undervalued homes in London">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#252a36"/>
      <stop offset="1" stop-color="#121419"/>
    </linearGradient>
    <linearGradient id="gb" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#17A589"/>
      <stop offset="1" stop-color="#2E86C1"/>
    </linearGradient>
    <linearGradient id="house" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1ec8a5"/>
      <stop offset="1" stop-color="#177fb4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#17A589" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#17A589" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2E86C1" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#2E86C1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- faint grid -->
  <g stroke="#3E4250" stroke-width="1" opacity="0.30">
    <line x1="0" y1="130" x2="800" y2="130"/>
    <line x1="0" y1="260" x2="800" y2="260"/>
    <line x1="0" y1="390" x2="800" y2="390"/>
    <line x1="160" y1="0" x2="160" y2="600"/>
    <line x1="320" y1="0" x2="320" y2="600"/>
    <line x1="480" y1="0" x2="480" y2="600"/>
    <line x1="640" y1="0" x2="640" y2="600"/>
  </g>

  <!-- atmosphere -->
  <ellipse cx="270" cy="360" rx="330" ry="260" fill="url(#glow)"/>
  <ellipse cx="620" cy="180" rx="280" ry="220" fill="url(#glow2)"/>

  <!-- London skyline silhouette -->
  <g fill="#181d29">
    <rect x="0" y="470" width="800" height="130"/>
    <!-- Big Ben -->
    <rect x="60" y="360" width="34" height="115"/>
    <polygon points="60,360 77,318 94,360"/>
    <rect x="72" y="345" width="10" height="18"/>
    <!-- blocks -->
    <rect x="120" y="420" width="58" height="60"/>
    <rect x="196" y="398" width="46" height="82"/>
    <!-- the Gherkin -->
    <path d="M 292 472 C 284 400 296 352 318 340 C 340 352 352 400 344 472 Z"/>
    <!-- blocks -->
    <rect x="372" y="410" width="60" height="66"/>
    <rect x="452" y="432" width="44" height="46"/>
    <!-- the Shard -->
    <polygon points="530,474 566,300 602,474"/>
    <!-- blocks -->
    <rect x="628" y="404" width="52" height="72"/>
    <rect x="702" y="428" width="66" height="50"/>
  </g>
  <!-- skyline window lights -->
  <g fill="#8fd8c8" opacity="0.5">
    <rect x="132" y="432" width="6" height="6"/><rect x="150" y="446" width="6" height="6"/>
    <rect x="206" y="412" width="6" height="6"/><rect x="222" y="430" width="6" height="6"/>
    <rect x="384" y="422" width="6" height="6"/><rect x="404" y="440" width="6" height="6"/>
    <rect x="640" y="416" width="6" height="6"/><rect x="658" y="438" width="6" height="6"/>
    <rect x="712" y="440" width="6" height="6"/>
  </g>

  <!-- market scatter: homes as points, fair-price line rising through them -->
  <g fill="#e7e7e7">
    <circle cx="110" cy="404" r="6" opacity="0.85"/>
    <circle cx="185" cy="362" r="6" opacity="0.9"/>
    <circle cx="262" cy="332" r="6" opacity="0.8"/>
    <circle cx="336" cy="286" r="6" opacity="0.9"/>
    <circle cx="414" cy="266" r="6" opacity="0.8"/>
    <circle cx="490" cy="212" r="6" opacity="0.9"/>
    <circle cx="566" cy="196" r="6" opacity="0.85"/>
    <circle cx="642" cy="150" r="6" opacity="0.9"/>
    <circle cx="706" cy="128" r="6" opacity="0.8"/>
  </g>
  <path d="M 70 448 C 280 380 480 260 740 100" fill="none" stroke="url(#gb)" stroke-width="5" stroke-linecap="round"/>

  <!-- the undervalued home: sits far below the fair-price line, spotlighted -->
  <line x1="360" y1="318" x2="360" y2="420" stroke="#1ABC9C" stroke-width="2.5" stroke-dasharray="6 6"/>
  <g transform="translate(360,442)">
    <circle r="52" fill="#101318" stroke="url(#gb)" stroke-width="4"/>
    <!-- house -->
    <g transform="translate(0,4)">
      <path d="M -26 -2 L 0 -26 L 26 -2 Z" fill="url(#house)"/>
      <rect x="-20" y="-2" width="40" height="26" rx="2" fill="url(#house)"/>
      <rect x="-6" y="6" width="12" height="18" rx="1.5" fill="#101318"/>
      <rect x="-16" y="4" width="8" height="8" rx="1" fill="#101318"/>
      <rect x="8" y="4" width="8" height="8" rx="1" fill="#101318"/>
    </g>
  </g>

  <!-- magnifier sweeping the market for the outlier -->
  <g transform="translate(560,330)">
    <circle r="58" fill="none" stroke="#ffffff" stroke-width="7"/>
    <circle r="58" fill="#17A589" opacity="0.10"/>
    <line x1="42" y1="42" x2="86" y2="86" stroke="#2E86C1" stroke-width="9" stroke-linecap="round"/>
    <!-- tick inside the lens: a find -->
    <path d="M -20 2 L -6 16 L 24 -16" fill="none" stroke="url(#gb)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
