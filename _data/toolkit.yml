# Technical toolkit shown on the home page.
# Library percentages are MEASURED, not self-assessed: scripts/measure_libraries.py
# runs over the source code of the published portfolio projects and attributes every
# executable line (blanks and comments excluded) to the library it calls.
# Recompute and update here whenever a new project is published.

languages:
  - name: Python
    note: modelling & pipelines
  - name: SQL
    note: querying & transformation
  - name: R
    note: statistical analysis
  - name: DAX
    note: Power BI measures

library_mix:
  measured_lines: 443
  source: "source code of the published portfolio projects"
  updated: 2026-07-05
  # Single-accent version (5 Jul). To revert to the teal-shade ramp, restore
  # per-library colors (darkest-to-lightest ramp) and re-add the label dots
  # in index.html (or git revert commit dc2484c).
  libraries:
    - name: scikit-learn
      pct: 35
      color: "#2dd4bf"
    - name: pandas
      pct: 32
      color: "#2dd4bf"
    - name: Matplotlib
      pct: 19
      color: "#2dd4bf"
  # The remainder to 100% (core Python, NumPy, pickle) is deliberately left
  # as empty track on the bar — no segment, no label.
